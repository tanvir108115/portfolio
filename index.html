<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0f0e;
    --surface: #111716;
    --border: #1e2925;
    --text: #d4ded9;
    --muted: #5a7069;
    --accent: #3dffc0;
    --red: #ff5a6e;
    --gold: #f5c842;
    --white: #f0f5f2;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    padding: 40px 32px;
  }

  /* noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; }

  /* HEADER */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 48px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--white);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }

  .date {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* KPI STRIP */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 40px;
  }

  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
  }
  .kpi::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    opacity: 0.5;
  }
  .kpi.neg::after { background: var(--red); }
  .kpi.gold::after { background: var(--gold); }

  .kpi-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .kpi-value {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--white);
    line-height: 1;
  }
  .kpi-sub {
    font-size: 11px;
    margin-top: 6px;
  }
  .pos { color: var(--accent); }
  .neg-c { color: var(--red); }

  /* GRID LAYOUT */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 24px;
  }

  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .table-title {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--white);
    font-style: italic;
  }

  .sort-btns { display: flex; gap: 8px; }
  .sort-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sort-btn.active, .sort-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(61,255,192,0.04);
  }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-align: right;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    font-weight: 400;
  }
  thead th:first-child { text-align: left; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
    cursor: default;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }

  td {
    padding: 11px 20px;
    text-align: right;
    color: var(--text);
    white-space: nowrap;
  }
  td:first-child { text-align: left; }

  .ticker-cell { display: flex; align-items: center; gap: 10px; }
  .ticker-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .ticker-name {
    font-weight: 500;
    color: var(--white);
    letter-spacing: 0.03em;
  }
  .ticker-type {
    font-size: 10px;
    color: var(--muted);
  }

  .gain-pos { color: var(--accent); }
  .gain-neg { color: var(--red); }

  /* allocation bar */
  .alloc-cell { min-width: 100px; }
  .alloc-bar-bg {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 4px;
    width: 80px;
    display: inline-block;
    vertical-align: middle;
  }
  .alloc-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
  }

  /* SIDE PANEL */
  .side { display: flex; flex-direction: column; gap: 20px; }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
  }
  .panel-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 18px;
  }

  /* donut chart */
  .donut-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  svg.donut { overflow: visible; }
  .donut-legend {
    width: 100%;
    margin-top: 18px;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .legend-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
  }
  .legend-left { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .legend-ticker { color: var(--white); }
  .legend-pct { color: var(--muted); }

  /* top movers */
  .mover-list { display: flex; flex-direction: column; gap: 10px; }
  .mover {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    border: 1px solid var(--border);
    background: var(--bg);
  }
  .mover-ticker { color: var(--white); font-weight: 500; }
  .mover-pct { font-size: 12px; }

  /* sparkline bar chart */
  .bar-chart { display: flex; align-items: flex-end; gap: 3px; height: 60px; }
  .bar-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar {
    width: 22px;
    border-radius: 2px 2px 0 0;
    transition: opacity 0.2s;
    cursor: default;
  }
  .bar:hover { opacity: 0.7; }
  .bar-label { font-size: 8px; color: var(--muted); }

  /* animate in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .kpi { animation: fadeUp 0.4s ease both; }
  .kpi:nth-child(1) { animation-delay: 0.05s; }
  .kpi:nth-child(2) { animation-delay: 0.1s; }
  .kpi:nth-child(3) { animation-delay: 0.15s; }
  .kpi:nth-child(4) { animation-delay: 0.2s; }
  .table-wrap { animation: fadeUp 0.4s 0.25s ease both; }
  .side .panel:nth-child(1) { animation: fadeUp 0.4s 0.3s ease both; }
  .side .panel:nth-child(2) { animation: fadeUp 0.4s 0.35s ease both; }
  .side .panel:nth-child(3) { animation: fadeUp 0.4s 0.4s ease both; }

  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    body { padding: 24px 16px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="logo">port<span>·</span>folio</div>
      <div class="date" style="margin-top:6px;">CAD denominated · as of Mar 2026</div>
    </div>
    <div style="text-align:right">
      <div class="date">15 positions</div>
      <div class="date" style="margin-top:4px; color: var(--accent);">Live summary</div>
    </div>
  </header>

  <div class="kpi-row">
    <div class="kpi">
      <div class="kpi-label">Total Invested</div>
      <div class="kpi-value">$102,810</div>
      <div class="kpi-sub" style="color:var(--muted)">CAD</div>
    </div>
    <div class="kpi gold">
      <div class="kpi-label">Total Value</div>
      <div class="kpi-value">$110,212</div>
      <div class="kpi-sub" style="color:var(--muted)">CAD</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Total Gain</div>
      <div class="kpi-value pos">+$7,402</div>
      <div class="kpi-sub pos">+7.20% overall</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Positions</div>
      <div class="kpi-value">11 / 15</div>
      <div class="kpi-sub pos">73% profitable</div>
    </div>
  </div>

  <div class="main-grid">

    <!-- TABLE -->
    <div class="table-wrap">
      <div class="table-header">
        <div class="table-title">Holdings</div>
        <div class="sort-btns">
          <button class="sort-btn active" onclick="sortTable('gain')">Gain%</button>
          <button class="sort-btn" onclick="sortTable('value')">Value</button>
          <button class="sort-btn" onclick="sortTable('alloc')">Alloc%</button>
        </div>
      </div>
      <table id="holdings-table">
        <thead>
          <tr>
            <th>Ticker</th>
            <th>Invested</th>
            <th>Value</th>
            <th>Gain/Loss</th>
            <th>Alloc %</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

    <!-- SIDE -->
    <div class="side">

      <!-- donut -->
      <div class="panel">
        <div class="panel-title">Allocation breakdown</div>
        <div class="donut-wrap">
          <svg class="donut" width="160" height="160" viewBox="0 0 160 160" id="donut-svg"></svg>
          <div class="donut-legend" id="donut-legend"></div>
        </div>
      </div>

      <!-- top movers -->
      <div class="panel">
        <div class="panel-title">Top movers</div>
        <div class="mover-list" id="movers-list"></div>
      </div>

      <!-- gain chart -->
      <div class="panel">
        <div class="panel-title">Gain distribution</div>
        <div class="bar-chart" id="bar-chart"></div>
      </div>

    </div>
  </div>
</div>

<script>
// ---- CONFIG — paste your Web App URL here after deploying ----
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxbv5FxUySGooTHcZo4OARMkqGwatlR9NgUjafiwJjgGD4-RT-UIGVB1uhssmhZOr1g/exec';
// Get this from: Apps Script → Deploy → Manage deployments → copy Web App URL

let holdings = [];

function parseMoney(val) {
  if (!val) return 0;
  const n = parseFloat(String(val).replace(/[$,\s]/g, '').trim());
  return isNaN(n) ? 0 : n;
}

function inferType(ticker) {
  if (!ticker) return '';
  const t = ticker.toUpperCase();
  if (t.endsWith('.TO') || t.endsWith('.V') || t.endsWith('.TSX')) return 'CA';
  return 'US';
}

async function loadFromSheets() {
  try {
    showStatus('loading');
    const res = await fetch(SCRIPT_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    holdings = (data.holdings || []).map(h => ({
      ...h,
      type: inferType(h.ticker),
    }));

    showStatus('ok', data.lastUpdated);
    renderAll();
  } catch (e) {
    showStatus('error', e.message);
    console.error('Fetch error:', e);
  }
}

function showStatus(state, msg) {
  let el = document.getElementById('fetch-status');
  if (!el) {
    el = document.createElement('div');
    el.id = 'fetch-status';
    el.style.cssText = 'position:fixed;bottom:20px;right:24px;font-family:DM Mono,monospace;font-size:11px;padding:8px 14px;border-radius:2px;z-index:999;transition:opacity 0.4s';
    document.body.appendChild(el);
  }
  if (state === 'loading') {
    el.style.background = '#1e2925'; el.style.color = '#5a7069'; el.style.opacity = '1';
    el.textContent = '⟳ Fetching from Google Sheets…';
  } else if (state === 'ok') {
    el.style.background = '#0d2b20'; el.style.color = '#3dffc0'; el.style.opacity = '1';
    const ts = msg ? new Date(msg).toLocaleTimeString() : new Date().toLocaleTimeString();
    el.textContent = '✓ Live data loaded · ' + ts;
    setTimeout(() => { el.style.opacity = '0'; }, 3000);
  } else {
    el.style.background = '#2b0d14'; el.style.color = '#ff5a6e'; el.style.opacity = '1';
    el.textContent = '✗ ' + (msg || 'Failed to load');
  }
}

function renderAll() {
  renderKPIs();
  renderTable(currentSort);
  renderDonut();
  renderMovers();
  renderBars();
}

function renderKPIs() {
  const totalInvested = holdings.reduce((s, h) => s + h.invested, 0);
  const totalValue    = holdings.reduce((s, h) => s + h.value, 0);
  const totalGain     = totalValue - totalInvested;
  const gainPct       = totalInvested > 0 ? (totalGain / totalInvested * 100) : 0;
  const profitable    = holdings.filter(h => h.gain >= 0).length;

  const kpis = document.querySelectorAll('.kpi');
  kpis[0].querySelector('.kpi-value').textContent = fmt(totalInvested);
  kpis[1].querySelector('.kpi-value').textContent = fmt(totalValue);
  kpis[2].querySelector('.kpi-value').textContent = (totalGain >= 0 ? '+' : '') + fmt(totalGain);
  kpis[2].querySelector('.kpi-sub').textContent   = (gainPct >= 0 ? '+' : '') + gainPct.toFixed(2) + '% overall';
  kpis[3].querySelector('.kpi-value').textContent = profitable + ' / ' + holdings.length;
  kpis[3].querySelector('.kpi-sub').textContent   = Math.round(profitable / holdings.length * 100) + '% profitable';
}

const COLORS = [
  '#3dffc0','#f5c842','#ff8c5a','#5ab4ff','#d97aff',
  '#ff5a6e','#a0f542','#42e0f5','#f542a7','#f5a742',
  '#7af5d2','#c4a0ff','#ff9ec4','#c4ff9e','#9ec4ff'
];

// ---- FORMAT ----
const fmt = (n) => '$' + n.toLocaleString('en-CA', {minimumFractionDigits: 2, maximumFractionDigits: 2});

// ---- TABLE ----
let currentSort = 'gain';

function renderTable(sort) {
  const sorted = [...holdings].sort((a, b) => {
    if (sort === 'gain') return b.gain - a.gain;
    if (sort === 'value') return b.value - a.value;
    if (sort === 'alloc') return b.alloc - a.alloc;
  });

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  sorted.forEach((h, i) => {
    const tr = document.createElement('tr');
    const isPos = h.gain >= 0;
    const gainClass = isPos ? 'gain-pos' : 'gain-neg';
    const gainStr = (isPos ? '+' : '') + h.gain.toFixed(2) + '%';
    const dot = COLORS[i % COLORS.length];
    const barW = Math.round((h.alloc / 40) * 80);
    const accountBadges = (h.accounts || []).map(a => {
      const short = a.replace('TFSA wealthsimple','WSⓉ').replace('TFSA','TFSA').replace('FHSA','FHSA').replace('RRSP','RRSP').replace('Regular','REG');
      return `<span style="font-size:9px;background:#1e2925;color:#5a7069;padding:1px 5px;border-radius:2px;margin-right:2px">${short}</span>`;
    }).join('');
    tr.innerHTML = `
      <td>
        <div class="ticker-cell">
          <div class="ticker-dot" style="background:${dot}"></div>
          <div>
            <div class="ticker-name">${h.ticker}</div>
            <div class="ticker-type">${accountBadges}</div>
          </div>
        </div>
      </td>
      <td>${fmt(h.invested)}</td>
      <td>${fmt(h.value)}</td>
      <td class="${gainClass}">${gainStr}</td>
      <td class="alloc-cell">
        <span>${h.alloc.toFixed(2)}%</span>
        <span class="alloc-bar-bg"><span class="alloc-bar-fill" style="width:${barW}px;background:${dot}"></span></span>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function sortTable(type) {
  currentSort = type;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderTable(type);
}

// ---- DONUT ----
function renderDonut() {
  const svg = document.getElementById('donut-svg');
  svg.innerHTML = '';
  const legend = document.getElementById('donut-legend');
  const cx = 80, cy = 80, r = 60, strokeW = 22;
  const circ = 2 * Math.PI * r;

  // top 6 by alloc, rest = other
  const sorted = [...holdings].sort((a, b) => b.alloc - a.alloc);
  const top = sorted.slice(0, 6);
  const otherAlloc = sorted.slice(6).reduce((s, h) => s + h.alloc, 0);
  const segments = [...top, { ticker: 'Other', alloc: otherAlloc }];

  let offset = 0;
  const paths = segments.map((seg, i) => {
    const pct = seg.alloc / 100;
    const dash = pct * circ;
    const gap = circ - dash;
    const color = i < 6 ? COLORS[holdings.findIndex(h => h.ticker === seg.ticker) % COLORS.length] : '#2a3a33';
    const el = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    el.setAttribute('cx', cx);
    el.setAttribute('cy', cy);
    el.setAttribute('r', r);
    el.setAttribute('fill', 'none');
    el.setAttribute('stroke', color);
    el.setAttribute('stroke-width', strokeW);
    el.setAttribute('stroke-dasharray', `${dash} ${gap}`);
    el.setAttribute('stroke-dashoffset', -(offset * circ));
    el.setAttribute('transform', `rotate(-90 ${cx} ${cy})`);
    el.style.transition = 'stroke-dashoffset 0.3s';
    svg.appendChild(el);
    offset += pct;
    return { color, seg };
  });

  // center text
  const totalVal = holdings.reduce((s, h) => s + h.value, 0);
  const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  txt.setAttribute('x', cx); txt.setAttribute('y', cy - 6);
  txt.setAttribute('text-anchor', 'middle');
  txt.setAttribute('fill', '#f0f5f2');
  txt.setAttribute('font-family', 'Fraunces, serif');
  txt.setAttribute('font-size', '14');
  txt.setAttribute('font-weight', '700');
  txt.textContent = '$' + Math.round(totalVal / 1000) + 'K';
  svg.appendChild(txt);

  const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  sub.setAttribute('x', cx); sub.setAttribute('y', cy + 12);
  sub.setAttribute('text-anchor', 'middle');
  sub.setAttribute('fill', '#5a7069');
  sub.setAttribute('font-family', 'DM Mono, monospace');
  sub.setAttribute('font-size', '9');
  sub.textContent = 'total value';
  svg.appendChild(sub);

  // legend
  legend.innerHTML = '';
  paths.forEach(({ color, seg }) => {
    const row = document.createElement('div');
    row.className = 'legend-row';
    row.innerHTML = `
      <div class="legend-left">
        <div class="legend-dot" style="background:${color}"></div>
        <span class="legend-ticker">${seg.ticker}</span>
      </div>
      <span class="legend-pct">${seg.alloc.toFixed(1)}%</span>
    `;
    legend.appendChild(row);
  });
}

function renderMovers() {
  const sorted = [...holdings].sort((a, b) => Math.abs(b.gain) - Math.abs(a.gain)).slice(0, 5);
  const list = document.getElementById('movers-list');
  list.innerHTML = '';
  sorted.forEach(h => {
    const isPos = h.gain >= 0;
    const div = document.createElement('div');
    div.className = 'mover';
    div.innerHTML = `
      <span class="mover-ticker">${h.ticker}</span>
      <span class="mover-pct ${isPos ? 'gain-pos' : 'gain-neg'}">${isPos ? '+' : ''}${h.gain.toFixed(2)}%</span>
    `;
    list.appendChild(div);
  });
}

// ---- BAR CHART ----
function renderBars() {
  const sorted = [...holdings].sort((a, b) => a.gain - b.gain);
  const maxAbs = Math.max(...holdings.map(h => Math.abs(h.gain)));
  const container = document.getElementById('bar-chart');
  container.innerHTML = '';
  sorted.forEach(h => {
    const isPos = h.gain >= 0;
    const pct = Math.abs(h.gain) / maxAbs;
    const height = Math.max(4, Math.round(pct * 52));
    const color = isPos ? 'var(--accent)' : 'var(--red)';
    const col = document.createElement('div');
    col.className = 'bar-col';
    col.title = `${h.ticker}: ${h.gain > 0 ? '+' : ''}${h.gain.toFixed(1)}%`;
    col.innerHTML = `<div class="bar" style="height:${height}px;background:${color};opacity:${0.5 + pct*0.5}"></div>`;
    container.appendChild(col);
  });
}

// ---- INIT ----
loadFromSheets();
setInterval(loadFromSheets, 5 * 60 * 1000);
</script>
</body>
</html>
